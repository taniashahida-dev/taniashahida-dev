<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tania — Full Stack Web Developer">
  <defs>
    <!-- deep teal base with a soft center lift -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1D2B25"/>
      <stop offset="50%" stop-color="#16211D"/>
      <stop offset="100%" stop-color="#0F1714"/>
    </radialGradient>

    <!-- breathing halo behind the name -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D6BD98" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#7C8B6F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7C8B6F" stop-opacity="0"/>
    </radialGradient>

    <!-- gold ↔ sage shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C8B6F">
        <animate attributeName="stop-color" values="#7C8B6F;#D6BD98;#7C8B6F" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#D6BD98">
        <animate attributeName="stop-color" values="#D6BD98;#E9E3D3;#D6BD98" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C8B6F">
        <animate attributeName="stop-color" values="#7C8B6F;#D6BD98;#7C8B6F" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- sweeping light across the name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D6BD98"/>
      <stop offset="50%" stop-color="#E9E3D3">
        <animate attributeName="offset" values="0.25;0.75;0.25" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#D6BD98"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#7C8B6F" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <clipPath id="frame"><rect width="1000" height="300" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1000" height="300" fill="url(#bg)"/>
    <rect width="1000" height="300" fill="url(#grid)"/>

    <ellipse cx="500" cy="140" rx="360" ry="150" fill="url(#halo)">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <!-- drifting signal lines -->
    <path d="M-20 58 C 180 18, 340 96, 520 56 S 830 20, 1020 64" stroke="#7C8B6F" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-140" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M-20 244 C 200 282, 380 208, 560 246 S 840 280, 1020 236" stroke="#D6BD98" stroke-opacity="0.20" stroke-width="1" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;140" dur="11s" repeatCount="indefinite"/>
    </path>

    <!-- rising particles -->
    <g>
      <circle cx="112" cy="260" r="2" fill="#D6BD98">
        <animate attributeName="cy" values="268;42" dur="9s" begin="-1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.15;0.75;1" dur="9s" begin="-1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="196" cy="260" r="1.5" fill="#7C8B6F">
        <animate attributeName="cy" values="272;58" dur="12s" begin="-5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.15;0.75;1" dur="12s" begin="-5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="298" cy="260" r="1.3" fill="#E9E3D3">
        <animate attributeName="cy" values="266;70" dur="8s" begin="-2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.15;0.75;1" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="398" cy="260" r="1.9" fill="#D6BD98">
        <animate attributeName="cy" values="270;48" dur="10.5s" begin="-6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.15;0.75;1" dur="10.5s" begin="-6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="524" cy="260" r="1.4" fill="#7C8B6F">
        <animate attributeName="cy" values="272;80" dur="11.5s" begin="-3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.65;0.65;0" keyTimes="0;0.15;0.75;1" dur="11.5s" begin="-3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="618" cy="260" r="2.3" fill="#D6BD98">
        <animate attributeName="cy" values="270;44" dur="9.5s" begin="-7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.15;0.75;1" dur="9.5s" begin="-7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="714" cy="260" r="1.3" fill="#E9E3D3">
        <animate attributeName="cy" values="266;72" dur="8.5s" begin="-1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.15;0.75;1" dur="8.5s" begin="-1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="816" cy="260" r="1.7" fill="#7C8B6F">
        <animate attributeName="cy" values="272;56" dur="10s" begin="-4.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.15;0.75;1" dur="10s" begin="-4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="902" cy="260" r="2" fill="#D6BD98">
        <animate attributeName="cy" values="268;50" dur="9s" begin="-3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.15;0.75;1" dur="9s" begin="-3.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- floating code glyphs -->
    <g font-family="'Courier New', Courier, monospace" font-size="30" text-anchor="middle">
      <g fill="#7C8B6F" opacity="0.5">
        <text x="150" y="158">&lt;/&gt;</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -9; 0 0" dur="5.5s" repeatCount="indefinite"/>
      </g>
      <g fill="#7C8B6F" opacity="0.5">
        <text x="852" y="158">{ }</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 9; 0 0" dur="6.5s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- corner ticks -->
    <g stroke="#D6BD98" stroke-width="1.6" stroke-linecap="round" opacity="0.75" fill="none">
      <path d="M30 48 V30 H48"/>
      <path d="M952 30 H970 V48"/>
      <path d="M970 252 V270 H952"/>
      <path d="M48 270 H30 V252"/>
    </g>

    <!-- name -->
    <text x="500" y="150" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="14" fill="url(#nameGrad)" filter="url(#glow)">TANIA</text>

    <!-- shimmering underline -->
    <rect x="402" y="170" width="196" height="3" rx="1.5" fill="url(#shimmer)" filter="url(#glowSm)">
      <animate attributeName="x" values="402;428;402" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="width" values="196;144;196" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- role -->
    <text x="500" y="207" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="7" fill="url(#shimmer)">FULL STACK WEB DEVELOPER</text>

    <!-- terminal line + blinking cursor -->
    <text x="300" y="250" font-family="'Courier New', Courier, monospace" font-size="15" fill="#7C8B6F" textLength="400" lengthAdjust="spacingAndGlyphs">&gt; open to internship &amp; junior developer roles</text>
    <rect x="708" y="238" width="8" height="15" rx="1" fill="#D6BD98">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- frame -->
  <rect x="0.8" y="0.8" width="998.4" height="298.4" rx="15.2" stroke="#7C8B6F" stroke-opacity="0.45" stroke-width="1.6"/>
</svg>